services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: brainbox-postgres
    environment:
      POSTGRES_DB: restai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brainbox

  redis:
    image: redis:7-alpine
    container_name: brainbox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brainbox

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brainbox-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - brainbox

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brainbox-celery
    command: celery -A app.celery_app.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/restai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    networks:
      - brainbox

  ollama:
    image: ollama/ollama:latest
    container_name: brainbox-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    networks:
      - brainbox

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  brainbox:
    driver: bridge
